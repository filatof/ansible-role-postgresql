# ============================================================
# Set password for postgres user
# ============================================================
- name: Ensure postgres user has a password
  become: true
  ansible.builtin.shell: |
    sudo -u postgres psql -c "ALTER USER postgres PASSWORD '{{ postgres_password }}';"
  changed_when: false

# =====================================================================
# Configure PostgreSQL for remote connections
# =====================================================================
- name: Configure PostgreSQL to listen on all addresses
  ansible.builtin.lineinfile:
    path: "/etc/postgresql/{{ postgresql_version }}/main/postgresql.conf"
    regexp: '^#?listen_addresses\s*='
    line: "listen_addresses = '{{ postgresql_listen_addresses }}'"
    state: present
  notify: Restart PostgreSQL
  when: postgresql_version != "latest"

- name: Configure PostgreSQL to listen on all addresses (latest)
  ansible.builtin.shell: |
    PG_VERSION=$(ls /etc/postgresql/ | head -n1)
    sed -i "s/^#\?listen_addresses\s*=.*/listen_addresses = '{{ postgresql_listen_addresses }}'/" \
      /etc/postgresql/${PG_VERSION}/main/postgresql.conf
  when: postgresql_version == "latest"
  notify: Restart PostgreSQL

- name: Ensure PostgreSQL is started
  ansible.builtin.systemd:
    name: postgresql
    state: started
    enabled: true

# ============================================================
# Create users
# ============================================================
- name: Create database users
  community.postgresql.postgresql_user:
    name: "{{ item.user }}"
    password: "{{ item.password }}"
    state: present
    login_user: postgres
    login_password: "{{ postgres_password }}"
    login_host: 127.0.0.1
  loop: "{{ postgresql_databases }}"
  loop_control:
    label: "{{ item.user }}"

# ============================================================
# Create databases
# ============================================================
- name: Create databases
  community.postgresql.postgresql_db:
    name: "{{ item.name }}"
    owner: "{{ item.owner }}"
    encoding: UTF8
    lc_collate: en_US.UTF-8
    lc_ctype: en_US.UTF-8
    template: template0
    state: present
    login_user: postgres
    login_password: "{{ postgres_password }}"
    login_host: 127.0.0.1
  loop: "{{ postgresql_databases }}"
  loop_control:
    label: "{{ item.name }}"

# ============================================================
# Create schemas (только если schema != public)
# ============================================================
- name: Create custom schemas
  community.postgresql.postgresql_schema:
    database: "{{ item.name }}"
    name: "{{ item.schema }}"
    state: present
    login_user: postgres
    login_password: "{{ postgres_password }}"
    login_host: 127.0.0.1
  loop: "{{ postgresql_databases }}"
  loop_control:
    label: "{{ item.name }}/{{ item.schema }}"
  when: item.schema != "public"

# ============================================================
# Grant privileges on databases
# ============================================================
- name: Grant ALL on database to owner
  community.postgresql.postgresql_privs:
    database: "{{ item.name }}"
    type: database
    roles: "{{ item.user }}"
    privs: ALL
    state: present
    login_user: postgres
    login_password: "{{ postgres_password }}"
    login_host: 127.0.0.1
  loop: "{{ postgresql_databases }}"
  loop_control:
    label: "{{ item.name }} -> {{ item.user }}"

# ============================================================
# Grant privileges on custom schemas
# ============================================================
- name: Grant ALL on schema to owner
  community.postgresql.postgresql_privs:
    database: "{{ item.name }}"
    type: schema
    objs: "{{ item.schema }}"
    roles: "{{ item.user }}"
    privs: ALL
    state: present
    login_user: postgres
    login_password: "{{ postgres_password }}"
    login_host: 127.0.0.1
  loop: "{{ postgresql_databases }}"
  loop_control:
    label: "{{ item.name }}/{{ item.schema }} -> {{ item.user }}"
  when: item.schema != "public"

# ============================================================
# Allow remote connections in pg_hba.conf
# ============================================================
- name: Allow remote connections in pg_hba.conf
  ansible.builtin.lineinfile:
    path: "/etc/postgresql/{{ postgresql_version }}/main/pg_hba.conf"
    line: "host    {{ item.name }}    {{ item.user }}    0.0.0.0/0    scram-sha-256"
    state: present
  notify: Restart PostgreSQL
  loop: "{{ postgresql_databases }}"
  loop_control:
    label: "{{ item.name }}"
  when: postgresql_version != "latest"

- name: Allow remote connections in pg_hba.conf (latest)
  ansible.builtin.shell: |
    PG_VERSION=$(ls /etc/postgresql/ | head -n1)
    grep -qF "host    {{ item.name }}    {{ item.user }}    0.0.0.0/0" \
      /etc/postgresql/${PG_VERSION}/main/pg_hba.conf || \
    echo "host    {{ item.name }}    {{ item.user }}    0.0.0.0/0    scram-sha-256" >> \
      /etc/postgresql/${PG_VERSION}/main/pg_hba.conf
  notify: Restart PostgreSQL
  loop: "{{ postgresql_databases }}"
  loop_control:
    label: "{{ item.name }}"
  when: postgresql_version == "latest"

# ============================================================
# Install extensions
# ============================================================
- name: Install database extensions
  community.postgresql.postgresql_ext:
    name: "{{ item.1 }}"
    db: "{{ item.0.name }}"
    schema: "{{ item.0.schema }}"
    state: present
    login_user: postgres
    login_password: "{{ postgres_password }}"
    login_host: 127.0.0.1
  with_subelements:
    - "{{ postgresql_databases }}"
    - extensions
    - skip_missing: true
  loop_control:
    label: "{{ item.0.name }}: {{ item.1 }}"
  when: item.1 | length > 0